name: Code Quality

on:
  push:
    branches: [main, master]
    paths:
      - 'easybot/**'
      - 'examples/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'easybot/**'
      - 'examples/**'

jobs:
  format:
    name: Auto Format and Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install tools
        run: pip install black isort

      - name: Run isort
        run: isort --profile=black easybot examples

      - name: Run Black
        run: black easybot examples

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "style: auto-format code with black and isort"
          git push

      - name: Fail if changes needed (PR)
        if: steps.check_changes.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::Code formatting issues found. Please run 'black .' and 'isort --profile=black .' locally."
          exit 1
