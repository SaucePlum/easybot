<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Robot Head -->
  <rect x="55" y="50" width="90" height="70" rx="15" fill="url(#botGradient)" filter="url(#glow)"/>
  
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="30" stroke="#4facfe" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="25" r="8" fill="#00f2fe"/>
  
  <!-- Eyes -->
  <circle cx="75" cy="80" r="12" fill="#1a1a2e"/>
  <circle cx="125" cy="80" r="12" fill="#1a1a2e"/>
  <circle cx="78" cy="77" r="4" fill="#fff"/>
  <circle cx="128" cy="77" r="4" fill="#fff"/>
  
  <!-- Smile/Mouth -->
  <path d="M 70 100 Q 100 120 130 100" fill="none" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Python Snake Curve (representing Python SDK) -->
  <path d="M 50 140 Q 60 125 75 130 Q 90 135 100 125 Q 110 115 125 120 Q 140 125 150 115" 
        fill="none" stroke="#FFD43B" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 50 155 Q 65 145 80 150 Q 95 155 105 145 Q 115 135 130 140 Q 145 145 150 135" 
        fill="none" stroke="#306998" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Decorative Dots -->
  <circle cx="45" cy="100" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="155" cy="100" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="60" cy="170" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="140" cy="170" r="3" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.9)">EasyBot</text>
</svg>
